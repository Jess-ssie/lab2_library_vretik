<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Бібліотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="container mt-5">

<h1>Облік книг бібліотеки</h1>

<a th:href="@{/add}" class="btn btn-primary mb-3">Додати нову книгу</a>

<table class="table table-bordered">
    <thead class="table-info">
    <tr>
        <th>#</th> <th>ID</th> <th>Назва</th>
        <th>Автор</th> <th>Категорія</th> <th>ISBN</th>
        <th>Дії</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book, iterStat : ${books}">
        <td th:text="${iterStat.count}"></td>
        <td class="text-center text-muted" th:text="${book.id}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author != null ? book.author.name : 'Автор не вказаний'}"></td>
        <td th:text="${book.ageCategory}"></td>
        <td th:text="${book.isbn}"></td>

        <td>
            <a th:href="@{'/edit/' + ${book.id}}" class="btn btn-warning btn-sm">Редагувати</a>

            <a th:href="@{'/delete/' + ${book.id}}"
               class="btn btn-outline-danger btn-sm"
               onclick="return confirm('Точно хочете видалити цю книгу?')">Видалити</a>
        </td>
    </tr>
    </tbody>
</table>

<p th:if="${books.empty}" class="text-muted text-center">Книг поки немає.</p>

</body>
</html>
