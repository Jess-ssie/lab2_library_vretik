<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід - Бібліотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div style="width: 450px;"> <h1 class="text-center mb-4">Вітаємо у бібліотеці!</h1>

    <div class="card shadow p-4">
        <h2 class="h5 text-center mb-4">Увійдіть в особистий кабінет бібліотекаря</h2>

        <div th:if="${error}" class="alert alert-danger py-2 text-center" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label text-muted small">Введіть логін</label>
                <input type="text" name="username" class="form-control" placeholder="логін" required>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small">Введіть пароль</label>
                <input type="password" name="password" class="form-control" placeholder="пароль" required>
            </div>

            <div class="row g-2">
                <div class="col-6">
                    <button type="submit" class="btn btn-primary w-100">Увійти</button>
                </div>
                <div class="col-6">
                    <a href="/" class="btn btn-info w-100">Скасувати</a>
                </div>
            </div>
        </form>
    </div>
</div>

</body>
</html>
